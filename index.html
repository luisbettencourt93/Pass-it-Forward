<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pass It Forward — Opportunity Infrastructure</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --primary: #10b981;
      --primary-dark: #059669;
      --dark: #0f172a;
      --gray: #64748b;
      --light: #f8fafc;
      --border: #e2e8f0;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--light); color: var(--dark); line-height: 1.7; }
    header { background: var(--dark); color: white; padding: 1.25rem 5%; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .header-inner { max-width: 1280px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 1.55rem; font-weight: 700; letter-spacing: -0.4px; }
    nav { display: flex; gap: 2rem; }
    nav a { color: white; text-decoration: none; font-weight: 500; }
    nav a:hover { color: var(--primary); }
    nav a.active { color: var(--primary); border-bottom: 3px solid var(--primary); padding-bottom: 4px; }

    .hero { padding: 10rem 5% 8rem; text-align: center; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); color: white; }
    .hero h1 { font-size: 3.8rem; font-weight: 800; margin-bottom: 1.5rem; letter-spacing: -1px; line-height: 1.05; }
    .hero .lead { font-size: 1.38rem; max-width: 760px; margin: 0 auto 2.5rem; color: #cbd5e1; font-weight: 300; }
    .brand-keywords { font-size: 1.18rem; font-weight: 500; margin: 2.5rem 0 4rem; color: #94a3b8; }
    .brand-keywords strong { color: var(--primary); font-weight: 700; }

    .section { padding: 8rem 5% 6rem; }
    .section h2 { font-size: 2.9rem; font-weight: 800; margin-bottom: 1.8rem; text-align: center; }
    .section .lead { font-size: 1.35rem; color: var(--gray); max-width: 780px; margin: 0 auto 3rem; text-align: center; line-height: 1.7; }

    .audience-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 2rem; margin: 4rem 0; }
    .audience-card { background: white; border-radius: 16px; padding: 2.2rem; box-shadow: 0 8px 32px rgba(0,0,0,0.07); text-align: center; }
    .audience-card h3 { font-size: 1.45rem; margin-bottom: 1rem; color: var(--primary-dark); }

    .apply-card { background: white; border-radius: 20px; padding: 3.5rem 2.8rem; box-shadow: 0 12px 48px rgba(0,0,0,0.09); max-width: 780px; margin: 5rem auto; text-align: center; }
    .apply-card h2 { font-size: 2.4rem; margin-bottom: 2rem; color: var(--primary-dark); }
    .apply-form { display: grid; gap: 1.4rem; max-width: 540px; margin: 0 auto; }
    input, textarea { width: 100%; padding: 1rem 1.3rem; border: 1px solid var(--border); border-radius: 10px; font-size: 1.05rem; }
    textarea { min-height: 140px; resize: vertical; }
    .btn { padding: 1.1rem 2.4rem; font-size: 1.08rem; font-weight: 600; border-radius: 999px; background: var(--primary); color: white; border: none; cursor: pointer; transition: all 0.25s; }
    .btn:hover { background: var(--primary-dark); transform: translateY(-2px); }
    #apply-success { display: none; margin-top: 2.5rem; padding: 1.8rem; background: #ecfdf5; border-radius: 12px; color: #065f46; font-weight: 500; text-align: left; white-space: pre-wrap; }

    footer { background: var(--dark); color: #cbd5e1; padding: 5rem 5% 3rem; text-align: center; font-size: 0.95rem; }
    footer a { color: var(--primary); text-decoration: none; font-weight: 500; }
    footer a:hover { text-decoration: underline; }

    .modal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.85); align-items: center; justify-content: center; }
    .modal-content { background: white; padding: 2.5rem; border-radius: 20px; width: 100%; max-width: 420px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
    .member-section { background: #f8fafc; display: none; padding: 8rem 5% 6rem; }
    .card { background: white; border-radius: 16px; padding: 1.8rem; box-shadow: 0 8px 32px rgba(0,0,0,0.07); margin-bottom: 1.5rem; transition: all 0.3s; }
    .card:hover { transform: translateY(-6px); box-shadow: 0 20px 50px rgba(0,0,0,0.12); }
    .verified-badge { background: #10b981; color: white; font-size: 0.8rem; padding: 0.2rem 0.8rem; border-radius: 999px; display: inline-block; }

    /* New Roadmap Style (like your image) */
    .roadmap {
      max-width: 900px;
      margin: 3rem auto;
      position: relative;
    }
    .roadmap::before {
      content: '';
      position: absolute;
      left: 48px;
      top: 40px;
      bottom: 40px;
      width: 4px;
      background: linear-gradient(to bottom, #10b981, #10b98188);
      border-radius: 999px;
    }
    .roadmap-item {
      display: flex;
      align-items: flex-start;
      gap: 2rem;
      margin-bottom: 4rem;
      position: relative;
    }
    .roadmap-number {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, #10b981, #059669);
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-weight: 700;
      flex-shrink: 0;
      box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
      z-index: 2;
    }
    .roadmap-content {
      background: white;
      padding: 1.8rem 2rem;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      flex: 1;
    }
    .roadmap-content h3 {
      color: #065f46;
      margin-bottom: 1rem;
      font-size: 1.35rem;
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Pass It Forward</div>
    <nav id="main-nav">
      <a href="#apply-card">Apply</a>
    </nav>
    <div id="auth-area">
      <button id="login-btn" class="btn">Member Login</button>
      <div id="user-area" style="display:none; align-items:center; gap:1rem;">
        <span style="color:#94a3b8;">Welcome, <strong id="display-name"></strong></span>
        <button id="logout-btn" class="btn" style="background:#64748b;">Logout</button>
      </div>
    </div>
  </div>
</header>

<section class="hero">
  <h1>Pass It Forward</h1>
  <p class="lead">
    A community-driven platform built for <strong>long-term vision</strong>.<br><br>
    Where serious people create <strong>real opportunities</strong> through <strong>self-made growth</strong> — and <strong>pass it forward</strong>.
  </p>
  <div class="brand-keywords">
    <strong>Self-made growth
