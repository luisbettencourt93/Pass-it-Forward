<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pass It Forward — Opportunity Infrastructure</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --primary: #10b981; --dark: #0f172a; --light: #f8fafc; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--light); color: var(--dark); }
    header { background: var(--dark); color: white; padding: 1rem 5%; position: sticky; top:0; }
    .btn { padding: 1rem 2.5rem; background: var(--primary); color: white; border: none; border-radius: 999px; font-weight: 600; cursor: pointer; }
    .modal { display: none; position: fixed; z-index: 4000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
    .modal-content { background: white; padding: 3rem; border-radius: 24px; width: 100%; max-width: 420px; }
    .level-section { padding: 1.5rem; background: #ecfdf5; border-radius: 16px; margin: 1rem 0; }
    .progress-container { height: 8px; background: #e2e8f0; border-radius: 999px; overflow: hidden; margin: 12px 0; }
    .progress-bar { height: 100%; background: var(--primary); transition: width 0.8s; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--primary); color: white; padding: 1rem 2rem; border-radius: 999px; display: none; }
  </style>
</head>
<body>
<header>
  <div style="max-width:1280px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;">
    <div style="font-size:1.65rem;font-weight:700;">Pass It Forward</div>
    <button id="login-btn" class="btn" onclick="showLoginModal()">Member Login</button>
    <div id="user-area" style="display:none;align-items:center;gap:1rem;">
      <span id="display-name"></span>
      <button onclick="logout()" class="btn" style="background:#64748b;">Logout</button>
    </div>
  </div>
</header>

<section id="dashboard" style="padding:6rem 5%;max-width:1280px;margin:0 auto;">
  <div style="background:white;padding:3rem;border-radius:24px;box-shadow:0 10px 40px rgba(0,0,0,0.1);">
    <h2>Welcome back, <span id="profile-name"></span> 👋</h2>
    <div class="level-section">
      <div style="font-size:1.4rem;font-weight:700;margin-bottom:8px;">
        <i class="fas fa-crown"></i> <span id="current-level">Founding Member</span>
      </div>
      <div style="font-size:2rem;font-weight:800;color:#10b981;" id="points-display">0</div>
      <small>points</small>
      <div class="progress-container"><div id="progress-bar" class="progress-bar" style="width:0%"></div></div>
      <small id="next-level-text">Next level at 11 points</small>
    </div>
    <button onclick="awardTestPoints(10)" class="btn" style="width:100%;margin:1rem 0;">+10 Test Points (Testimonial)</button>
    <button onclick="awardTestPoints(15)" class="btn" style="width:100%;margin:1rem 0;background:#059669;">+15 Test Points (Opportunity)</button>
  </div>
</section>

<div id="login-modal" class="modal">
  <div class="modal-content">
    <h2>Member Login</h2>
    <input type="email" id="login-email" placeholder="you@email.com" style="width:100%;padding:1rem;margin:1rem 0;border:2px solid #e2e8f0;border-radius:12px;">
    <input type="password" id="login-password" placeholder="Password (min 6 chars)" style="width:100%;padding:1rem;margin:1rem 0;border:2px solid #e2e8f0;border-radius:12px;">
    <button onclick="handleLogin()" class="btn" style="width:100%;margin-top:1rem;">Login</button>
    <button onclick="closeModal()" style="margin-top:1rem;background:none;border:none;color:#64748b;cursor:pointer;">Cancel</button>
  </div>
</div>

<div id="toast" class="toast"><i class="fas fa-check-circle"></i><span id="toast-text"></span></div>

<script>
const SUPABASE_URL = 'https://mdnpnkqjhymxaonssewt.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_1sg7iImUiQ98nPYs9eyDRA_aJM8_sJj';
const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let profile = null;

const levelThresholds = [
  {name: 'Founding Member', min: 0, max: 10},
  {name: 'Active Builder', min: 11, max: 30},
  {name: 'Core Contributor', min: 31, max: 60},
  {name: 'Community Pillar', min: 61, max: Infinity}
];

function getLevelInfo(points) {
  for (let i = 0; i < levelThresholds.length; i++) {
    if (points <= levelThresholds[i].max) {
      const next = levelThresholds[i + 1];
      const progress = next ? Math.round(((points - levelThresholds[i].min) / (next.min - levelThresholds[i].min)) * 100) : 100;
      return {name: levelThresholds[i].name, progress, nextLevel: next ? next.name : null, nextPoints: next ? next.min : null};
    }
  }
}

async function loadProfile() {
  if (!currentUser) return;
  let { data } = await supabase.from('profiles').select('*').eq('id', currentUser.id).single();
  if (!data) {
    await supabase.from('profiles').insert({ id: currentUser.id, username: currentUser.email });
    data = (await supabase.from('profiles').select('*').eq('id', currentUser.id).single()).data;
  }
  profile = data;
  updateLevelUI();
}

function updateLevelUI() {
  if (!profile) return;
  const info = getLevelInfo(profile.points);
  document.getElementById('current-level').textContent = info.name;
  document.getElementById('points-display').textContent = profile.points;
  document.getElementById('progress-bar').style.width = info.progress + '%';
  document.getElementById('next-level-text').textContent = info.nextLevel 
    ? `Next: ${info.nextLevel} at ${info.nextPoints} points` 
    : 'Legendary status achieved';
}

async function awardTestPoints(amount) {
  if (!currentUser) return showToast("Login first");
  await supabase.rpc('award_points', { p_amount: amount });
  await loadProfile();
}

function showLoginModal() { document.getElementById('login-modal').style.display = 'flex'; }
function closeModal() { document.getElementById('login-modal').style.display = 'none'; }

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value.trim();
  if (!email || !password) return showToast("Enter email and password");

  const { data, error } = await supabase.auth.signInWithPassword({ email, password });
  if (error) return showToast("Login failed. Try again or use a new email/password.");

  currentUser = data.user;
  closeModal();
  document.getElementById('login-btn').style.display = 'none';
  document.getElementById('user-area').style.display = 'flex';
  document.getElementById('display-name').textContent = email.split('@')[0];
  document.getElementById('profile-name').textContent = email.split('@')[0];
  await loadProfile();
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toast-text').textContent = msg;
  toast.style.display = 'flex';
  setTimeout(() => toast.style.display = 'none', 3000);
}

async function logout() {
  await supabase.auth.signOut();
  location.reload();
}

async function init() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    currentUser = session.user;
    document.getElementById('login-btn').style.display = 'none';
    document.getElementById('user-area').style.display = 'flex';
    document.getElementById('display-name').textContent = currentUser.email.split('@')[0];
    document.getElementById('profile-name').textContent = currentUser.email.split('@')[0];
    await loadProfile();
  }
}

window.onload = init;
</script>
</body>
</html>
