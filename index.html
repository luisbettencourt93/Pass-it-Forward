<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pass It Forward — Opportunity Infrastructure</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

<style>
:root{
--primary:#10b981;
--primary-dark:#059669;
--dark:#0f172a;
--gray:#64748b;
--light:#f8fafc;
--border:#e2e8f0;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Inter;background:var(--light);color:var(--dark);line-height:1.7;}

header{background:var(--dark);color:white;padding:1.2rem 5%;}
.header-inner{display:flex;justify-content:space-between;align-items:center;}
.logo{font-size:1.5rem;font-weight:700;}

.hero{padding:8rem 5%;text-align:center;background:#0f172a;color:white;}
.btn{padding:1rem 2rem;border:none;border-radius:999px;background:var(--primary);color:white;cursor:pointer;}
.btn:hover{background:var(--primary-dark);}

.section{padding:6rem 5%;}
.apply-card{background:white;padding:2rem;border-radius:16px;max-width:700px;margin:auto;}
input,textarea{width:100%;padding:1rem;border:1px solid var(--border);border-radius:10px;margin-bottom:1rem;}
textarea{min-height:120px;}

#apply-success{display:none;background:#ecfdf5;padding:1rem;border-radius:12px;margin-top:1rem;}

.member-section{display:none;}

.dashboard-card{background:white;padding:2rem;border-radius:16px;box-shadow:0 8px 30px rgba(0,0,0,.08);}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;margin:2rem 0;}
.stat-card{background:#ecfdf5;padding:1rem;border-radius:12px;text-align:center;}
.goal-list{list-style:none;padding:0;margin-top:1rem;}
.goal-list li{display:flex;align-items:center;gap:.7rem;padding:.8rem;border:1px solid #e2e8f0;border-radius:10px;margin-bottom:.6rem;background:white;}

.milestone-progress{height:8px;background:#e2e8f0;border-radius:999px;margin:.5rem 0;}
.milestone-bar{height:100%;background:#10b981;}

.chat-window{
position:fixed;
bottom:20px;
right:20px;
width:400px;
height:500px;
background:white;
display:none;
flex-direction:column;
border-radius:16px;
box-shadow:0 10px 40px rgba(0,0,0,.2);
}
.chat-header{background:var(--primary);color:white;padding:1rem;}
.chat-messages{flex:1;overflow:auto;padding:1rem;background:#f8fafc;}
.chat-input{display:flex;padding:1rem;gap:.5rem;}
.chat-input input{flex:1;}
</style>
</head>

<body>

<header>
<div class="header-inner">
<div class="logo">Pass It Forward</div>
<button id="login-btn" class="btn">Member Login</button>
</div>
</header>

<section class="hero">
<h1>Pass It Forward</h1>
<p>Community-driven opportunity infrastructure.</p>
</section>

<section class="section" id="apply-card">
<div class="apply-card">
<h2>Apply for Access</h2>

<form id="apply-form" action="https://formspree.io/f/mgolzjjr" method="POST">
<input type="hidden" name="_subject" value="Pass It Forward Application">
<input type="text" name="name" placeholder="Full Name" required>
<input type="text" name="x_username" placeholder="X Handle" required>
<textarea name="skills" placeholder="Your skills/experience" required></textarea>
<textarea name="motivation" placeholder="Why do you want to join?" required></textarea>
<button class="btn" type="submit">Apply</button>
</form>

<div id="apply-success">
✔️ Application received — thank you.
</div>

</div>
</section>

<section class="member-section section" id="dashboard">
<div class="dashboard-card">
<h2>Dashboard</h2>

<div class="stat-grid">
<div class="stat-card"><h3 id="goals-completed">0</h3><p>Goals Completed</p></div>
<div class="stat-card"><h3 id="streak">1</h3><p>Day Streak</p></div>
</div>

<input id="personal-goal-input" placeholder="Add goal">
<button class="btn" onclick="addPersonalGoal()">Add Goal</button>
<ul id="personal-goals-list" class="goal-list"></ul>

<h3 style="margin-top:2rem;">Community Milestones</h3>
<ul id="community-milestones" class="goal-list"></ul>
</div>
</section>

<div id="chat-window" class="chat-window">
<div class="chat-header">Community Chat</div>
<div id="chat-messages" class="chat-messages"></div>
<div class="chat-input">
<input id="chat-input" placeholder="Type message..." onkeypress="if(event.key==='Enter') sendMessage()">
<button class="btn" onclick="sendMessage()">Send</button>
</div>
</div>

<script>
const ACCESS_CODE="founder2026";

/* FIREBASE */
firebase.initializeApp({
apiKey:"AIzaSyDdYdJb2cFv4R5Kf2NruN6zaPsAEkathHj9E",
databaseURL:"https://pass-it-forward-chat-default-rtdb.firebaseio.com"
});
const database=firebase.database();

/* APPLY FORM */
document.getElementById("apply-form").addEventListener("submit",()=>{
document.getElementById("apply-form").style.display="none";
document.getElementById("apply-success").style.display="block";
});

/* LOGIN */
document.getElementById("login-btn").onclick=function(){
const code=prompt("Enter member code:");
if(code===ACCESS_CODE){
document.getElementById("dashboard").style.display="block";
document.getElementById("chat-window").style.display="flex";
}
};

/* PERSONAL GOALS */
let currentUser="member";

function addPersonalGoal(){
const input=document.getElementById("personal-goal-input");
if(!input.value.trim())return;
let goals=JSON.parse(localStorage.getItem("goals")||"[]");
goals.push({text:input.value,done:false});
localStorage.setItem("goals",JSON.stringify(goals));
input.value="";
renderGoals();
}

function renderGoals(){
const list=document.getElementById("personal-goals-list");
list.innerHTML="";
let goals=JSON.parse(localStorage.getItem("goals")||"[]");
document.getElementById("goals-completed").textContent=goals.filter(g=>g.done).length;
goals.forEach((g,i)=>{
const li=document.createElement("li");
li.innerHTML=`<input type="checkbox" onchange="toggleGoal(${i})" ${g.done?"checked":""}> ${g.text}`;
list.appendChild(li);
});
}
function toggleGoal(i){
let goals=JSON.parse(localStorage.getItem("goals")||"[]");
goals[i].done=!goals[i].done;
localStorage.setItem("goals",JSON.stringify(goals));
renderGoals();
}
renderGoals();

/* CHAT */
function loadCommunityMessages(){
const container=document.getElementById("chat-messages");
container.innerHTML="";
const ref=database.ref("communityChat");
ref.off(); // FIX duplicate listener
ref.on("child_added",(snap)=>{
const msg=snap.val();
const div=document.createElement("div");
div.innerHTML=`<strong>@${msg.user}</strong>: ${msg.text}`;
container.appendChild(div);
container.scrollTop=container.scrollHeight;
});
}

function sendMessage(){
const input=document.getElementById("chat-input");
if(!input.value.trim())return;
database.ref("communityChat").push({
user:currentUser,
text:input.value
});
input.value="";
}

loadCommunityMessages();
</script>

</body>
</html>
