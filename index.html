<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pass It Forward — Opportunity Infrastructure</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --primary: #10b981; --primary-dark: #059669; --dark: #0f172a; --gray: #64748b; --light: #f8fafc; --border: #e2e8f0; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--light); color: var(--dark); line-height: 1.7; scroll-behavior: smooth; }
    header { background: var(--dark); color: white; padding: 1.25rem 5%; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .header-inner { max-width: 1280px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 1.65rem; font-weight: 700; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
    nav { display: flex; gap: 2.2rem; }
    nav a { color: white; text-decoration: none; font-weight: 500; transition: color 0.2s; cursor: pointer; }
    nav a:hover, nav a.active { color: var(--primary); border-bottom: 3px solid var(--primary); padding-bottom: 4px; }
    .section, .member-section { padding: 8rem 5% 6rem; max-width: 1280px; margin: 0 auto; display: none; }
    .section.active, .member-section.active { display: block; }
    .fund-balance { font-size: 4.8rem; font-weight: 800; color: var(--primary); text-align: center; margin: 2rem 0; }
    .fund-change { font-size: 1.3rem; text-align: center; margin-bottom: 2rem; font-weight: 600; }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo"><i class="fas fa-arrow-right"></i> Pass It Forward</div>
    <nav id="main-nav">
      <a onclick="switchTab('hero');return false" class="nav-link active">Home</a>
      <a onclick="switchTab('vision');return false" class="nav-link member-link" style="display:none;">Roadmap</a>
      <a onclick="switchTab('testimonials');return false" class="nav-link member-link" style="display:none;">Testimonials</a>
      <a onclick="switchTab('dashboard');return false" class="nav-link member-link" style="display:none;">Dashboard</a>
      <a onclick="switchTab('funds');return false" class="nav-link member-link" style="display:none;">Funds</a>
    </nav>
    <div id="auth-area">
      <button id="login-btn" class="btn" onclick="showLoginModal()">Member Login</button>
      <div id="user-area" style="display:none;align-items:center;gap:1rem;">
        <span style="color:#94a3b8;">Welcome, <strong id="display-name"></strong></span>
        <button onclick="logout()" class="btn" style="background:#64748b;padding:0.9rem 1.8rem;">Logout</button>
      </div>
    </div>
  </div>
</header>

<!-- Your original sections (hero, apply, testimonials, vision, dashboard) are here unchanged -->

<section id="funds" class="member-section">
  <div style="max-width:900px;margin:0 auto;text-align:center;">
    <h2 style="color:#065f46;">Community Fund</h2>
    <div style="background:white;padding:4rem;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,0.1);">
      <div id="fund-balance" style="font-size:5rem;font-weight:800;color:var(--primary);margin-bottom:1rem;">$1,247.50</div>
      <div id="fund-change" style="font-size:1.3rem;font-weight:600;margin-bottom:2rem;">Live updates for everyone</div>
      <button onclick="simulateDonation()" class="btn" style="margin:0.5rem;">+ $500 Donation</button>
      <button onclick="simulateSpend()" class="btn" style="background:#ef4444;margin:0.5rem;">- $200 Spend</button>
    </div>
  </div>
</section>

<!-- Your existing modals and toast -->

<script>
const SUPABASE_URL = 'https://mdnpnkqjhymxaonssewt.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_1sg7iImUiQ98nPYs9eyDRA_aJM8_sJj';
const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let fundBalance = 1247.50;

// Realtime fund listener
supabase.channel('fund-channel')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'community_fund' }, (payload) => {
    fundBalance = parseFloat(payload.new.total_balance);
    document.getElementById('fund-balance').textContent = '$' + fundBalance.toLocaleString();
  })
  .subscribe();

async function simulateDonation() {
  await supabase.rpc('update_fund', { amount: 500 });
}

async function simulateSpend() {
  await supabase.rpc('update_fund', { amount: -200 });
}

// Your existing code (login, tabs, leveling, etc.) goes here...
// (the rest of your script from previous versions)

async function init() {
  const { data: { session } } = await supabase.auth.getSession();
  if (session) {
    currentUser = session.user;
    // your existing login code
  }
}

window.onload = init;
</script>
</body>
</html>
