<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pass It Forward — Opportunity Infrastructure</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root { --primary: #10b981; --primary-dark: #059669; --dark: #0f172a; --gray: #64748b; --light: #f8fafc; --border: #e2e8f0; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--light); color: var(--dark); line-height: 1.7; scroll-behavior: smooth; }
    header { background: var(--dark); color: white; padding: 1.25rem 5%; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
    .header-inner { max-width: 1280px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
    .logo { font-size: 1.65rem; font-weight: 700; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
    nav { display: flex; gap: 2.2rem; }
    nav a { color: white; text-decoration: none; font-weight: 500; transition: color 0.2s; cursor: pointer; }
    nav a:hover, nav a.active { color: var(--primary); border-bottom: 3px solid var(--primary); padding-bottom: 4px; }
    .section, .member-section { padding: 8rem 5% 6rem; max-width: 1280px; margin: 0 auto; display: none; }
    .section.active, .member-section.active { display: block; }
    .fund-balance { font-size: 4.8rem; font-weight: 800; color: var(--primary); text-align: center; margin: 2rem 0; animation: pulse 2s infinite; }
    .fund-change { font-size: 1.3rem; text-align: center; font-weight: 600; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.85; } }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo"><i class="fas fa-arrow-right"></i> Pass It Forward</div>
    <nav id="main-nav">
      <a onclick="switchTab('hero');return false" class="nav-link active">Home</a>
      <a onclick="switchTab('vision');return false" class="nav-link member-link" style="display:none;">Roadmap</a>
      <a onclick="switchTab('testimonials');return false" class="nav-link member-link" style="display:none;">Testimonials</a>
      <a onclick="switchTab('dashboard');return false" class="nav-link member-link" style="display:none;">Dashboard</a>
      <a onclick="switchTab('funds');return false" class="nav-link member-link" style="display:none;">Funds</a>
    </nav>
    <div id="auth-area">
      <button id="login-btn" class="btn" onclick="showLoginModal()">Member Login</button>
      <div id="user-area" style="display:none;align-items:center;gap:1rem;">
        <span style="color:#94a3b8;">Welcome, <strong id="display-name"></strong></span>
        <button onclick="logout()" class="btn" style="background:#64748b;padding:0.9rem 1.8rem;">Logout</button>
      </div>
    </div>
  </div>
</header>

      <div id="fund-balance" class="fund-balance">$250,000</div>

    </div>
  </div>
</section>

<!-- Your modals (login, post, goal, welcome) stay exactly as you had them -->

<div id="toast" class="toast"><i class="fas fa-check-circle"></i><span id="toast-text"></span></div>

<script>

const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Realtime fund balance
supabase.channel('fund-channel')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'community_fund' }, (payload) => {
    const newBalance = parseFloat(payload.new.total_balance);
    document.getElementById('fund-balance').textContent = '$' + newBalance.toLocaleString();
  })

// Your existing functions (renderTestimonials, renderRoadmap, etc.) remain exactly as you wrote them

// Fixed login + tabs
function showLoginModal() { document.getElementById('login-modal').style.display = 'flex'; }
function closeModal() { document.getElementById('login-modal').style.display = 'none'; }

async function handleLogin() {
  const code = document.getElementById('accesscode').value.trim();
  if (code === 'founder2026') {
    currentUser = { email: 'founder@passitforward.xyz' };
    closeModal();
    showMemberTabs();
  } else {
    showToast("Wrong access code — use founder2026");
  }
}

function showMemberTabs() {
  document.getElementById('login-btn').style.display = 'none';
  document.getElementById('user-area').style.display = 'flex';
  document.getElementById('display-name').textContent = "Founder";
  document.querySelectorAll('.member-link').forEach(l => l.style.display = 'inline-block');
  switchTab('dashboard');
}

function logout() {
  location.reload();
}

function switchTab(tabId) {
  document.querySelectorAll('#main-nav a').forEach(a => a.classList.remove('active'));
  const active = Array.from(document.querySelectorAll('#main-nav a')).find(a => a.getAttribute('onclick').includes(tabId));
  if (active) active.classList.add('active');

  document.querySelectorAll('.member-section').forEach(s => s.style.display = 'none');
  if (tabId === 'hero') {
    document.getElementById('hero').scrollIntoView({ behavior: 'smooth' });
  } else {
    const sec = document.getElementById(tabId);
    if (sec) sec.style.display = 'block';
  }
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  document.getElementById('toast-text').textContent = msg;
  toast.style.display = 'flex';
  setTimeout(() => toast.style.display = 'none', 2800);
}

// Your other functions (renderTestimonials, renderRoadmap, etc.) go here exactly as you had them...

window.onload = () => {

  renderRoadmap();
  renderOpportunities();
  renderGoal();
  document.getElementById('login-btn').addEventListener('click', showLoginModal);
  document.getElementById('logout-btn').addEventListener('click', logout);
  document.getElementById('apply-form').addEventListener('submit', e => {
    e.preventDefault();
    showToast("✅ Application received! We'll DM you within 48 hours.");
  });
};
</script>
</body>
</html>
